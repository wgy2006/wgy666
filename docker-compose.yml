services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wgy666-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wgy666
      POSTGRES_PASSWORD: wgy666
      POSTGRES_DB: wgy666
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wgy666 -d wgy666"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
